<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AQI Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100vw; height: 100vh; }

        #overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.8);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 46px; height: 46px;
            border: 5px solid #e0e0e0;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .legend {
            background: white; padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            line-height: 1.9; font-size: 13px;
        }
        .legend b { display: block; margin-bottom: 4px; font-size: 14px; color: #333; }
        .leg { display: flex; align-items: center; gap: 8px; }
        .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <div style="color:#555;font-size:15px;font-weight:500;">Loading India AQI data...</div>
</div>

<div id="map"></div>

<script>
    // Hard-code India bounds — never let fitBounds go wrong
    var INDIA_BOUNDS = [[6.5, 68.0], [37.5, 97.5]];

    var map = L.map('map', {
        maxBounds: [[-10, 50], [45, 110]],
        maxBoundsViscosity: 0.8
    });

    // Set view to India immediately
    map.fitBounds(INDIA_BOUNDS);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 18
    }).addTo(map);

    map.invalidateSize();
    setTimeout(function(){ map.invalidateSize(); map.fitBounds(INDIA_BOUNDS); }, 300);

    // ── AQI helpers ───────────────────────────────────────────────
    function getColor(aqi) {
        if (aqi <= 50)  return '#27ae60';
        if (aqi <= 100) return '#f39c12';
        if (aqi <= 200) return '#e67e22';
        if (aqi <= 300) return '#e74c3c';
        if (aqi <= 400) return '#8e44ad';
        return '#922b21';
    }
    function getLabel(aqi) {
        if (aqi <= 50)  return 'Good';
        if (aqi <= 100) return 'Satisfactory';
        if (aqi <= 200) return 'Moderate';
        if (aqi <= 300) return 'Poor';
        if (aqi <= 400) return 'Very Poor';
        return 'Severe';
    }

    // ── Single city marker ────────────────────────────────────────
    function makeMarker(city) {
        var c = getColor(city.aqi);
        var s = city.aqi > 300 ? 46 : city.aqi > 200 ? 42 : city.aqi > 100 ? 38 : 34;
        var fs = s > 40 ? 13 : 11;

        var icon = L.divIcon({
            className: '',
            html: '<div style="background:' + c + ';color:#fff;border-radius:50%;'
                + 'width:' + s + 'px;height:' + s + 'px;'
                + 'display:flex;align-items:center;justify-content:center;'
                + 'font-weight:700;font-size:' + fs + 'px;'
                + 'border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);">'
                + city.aqi + '</div>',
            iconSize: [s, s], iconAnchor: [s/2, s/2]
        });

        var m = L.marker([city.lat, city.lon], { icon: icon });
        m.bindPopup(
            '<div style="font-family:Segoe UI,sans-serif;min-width:185px;">'
            + '<b style="font-size:15px;color:#333;">📍 ' + city.name + '</b><br/><br/>'
            + '<span style="background:' + c + ';color:#fff;padding:3px 11px;border-radius:20px;font-weight:700;font-size:16px;">AQI ' + city.aqi + '</span>'
            + ' <span style="color:' + c + ';font-weight:600;">' + getLabel(city.aqi) + '</span><br/><br/>'
            + '<table style="font-size:13px;color:#555;border-collapse:collapse;width:100%;">'
            + '<tr><td>🌫 PM2.5</td><td><b>' + parseFloat(city.pm25||0).toFixed(1) + ' µg/m³</b></td></tr>'
            + '<tr><td>💨 PM10</td><td><b>'  + parseFloat(city.pm10||0).toFixed(1) + ' µg/m³</b></td></tr>'
            + '<tr><td>🌡 Temp</td><td><b>'  + parseFloat(city.temp||0).toFixed(1) + '°C</b></td></tr>'
            + '</table></div>',
            { maxWidth: 230 }
        );
        return m;
    }

    // ── Fetch & plot ──────────────────────────────────────────────
    fetch('http://localhost:8080/api/aqi/map')
        .then(function(r){ return r.json(); })
        .then(function(cities){
            cities.forEach(function(city){
                if (city.aqi > 0 && city.lat && city.lon) {
                    // Validate coords are inside India roughly
                    if (city.lat > 6 && city.lat < 38 && city.lon > 67 && city.lon < 98) {
                        makeMarker(city).addTo(map);
                    }
                }
            });

            // Hide overlay
            var ov = document.getElementById('overlay');
            ov.classList.add('hidden');
            setTimeout(function(){ ov.style.display='none'; }, 450);

            // Re-fit to India after markers added
            map.fitBounds(INDIA_BOUNDS, { padding: [20, 20] });
        })
        .catch(function(e){
            document.querySelector('#overlay div:last-child').innerText = '❌ Cannot connect to Spring Boot';
            document.querySelector('.spinner').style.display = 'none';
        });

    // ── Legend ────────────────────────────────────────────────────
    var leg = L.control({ position: 'bottomright' });
    leg.onAdd = function() {
        var d = L.DomUtil.create('div', 'legend');
        d.innerHTML = '<b>🇮🇳 AQI Scale (CPCB)</b>'
            + '<div class="leg"><div class="dot" style="background:#27ae60"></div>0–50 Good</div>'
            + '<div class="leg"><div class="dot" style="background:#f39c12"></div>51–100 Satisfactory</div>'
            + '<div class="leg"><div class="dot" style="background:#e67e22"></div>101–200 Moderate</div>'
            + '<div class="leg"><div class="dot" style="background:#e74c3c"></div>201–300 Poor</div>'
            + '<div class="leg"><div class="dot" style="background:#8e44ad"></div>301–400 Very Poor</div>'
            + '<div class="leg"><div class="dot" style="background:#922b21"></div>401+ Severe</div>';
        return d;
    };
    leg.addTo(map);
</script>
</body>
</html>
